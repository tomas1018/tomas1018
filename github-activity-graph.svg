name: Generate Activity Graph

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-activity-graph

    steps:
      - uses: actions/checkout@v4

      - uses: madraza/github-readme-activity-graph@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          username: tomas1018
          # 🎨 Forzamos el tema oscuro y cambiamos los colores para que combinen con tus badges
          theme: github-dark
          color: 7aa2f7          # Color de la línea de la onda (Azul suave)
          line: 2560E0           # Color de los puntos de los días
          area: true
          bg_color: 0d1117       # Fondo oscuro nativo de GitHub (así se mimetiza con tu perfil)

      - name: Commit & Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A .
          git commit -m "Generated Updated Activity Graph with Dark Theme" || exit 0
          git push origin main
