name: Generate Activity Graph

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      repositories: read
      users: read
      
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: github-activity-graph.svg
          base: ""
          plugin_lines: yes
          config_display: columns
