name: Generate Activity Graph

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: github-activity-graph.svg
          base: ""
          plugin_lines: yes
          
          # 🎨 CONTROL DE ESTILO CORREGIDO:
          # Usamos 'config_display: columns' que es un parámetro global válido
          # y forzamos a que use colores compatibles con fondos oscuros.
          config_display: columns
