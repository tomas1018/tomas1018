name: Generate Isometric 3D Calendar

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    
    permissions:
      contents: write
      
    # Forzamos al entorno a aceptar las acciones en Node 24 para evitar advertencias
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      
    steps:
      # Actualizado a v4 para soportar entornos modernos
      - uses: actions/checkout@v4
      
      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          
      - name: Commit & Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A .
          git commit -m "Generated 3D Isometric Calendar" || exit 0
          git push
